apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: InsuranceSer-prod
  namespace: argocd

spec:

  project: InsuranceSer

  source:
    repoURL: https://github.com/rishikeyy/Central-Helm.git

    targetRevision: main

    path: charts/InsuranceService

    helm:
      valueFiles:
        - ../../environments/prod/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: InsuranceSer-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true