apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: auth-dev

spec:

  project: insurance-platform

  source:

    repoURL: https://github.com/rishikeyy/Central-Helm.git

    targetRevision: main

    path: charts/user-auth-service

    helm:
      valueFiles:
        - ../../environments/dev/auth-values.yaml
        - ../../environments/dev/auth-image.yaml

  destination:

    server: https://kubernetes.default.svc

    namespace: InsuranceSer-dev

  syncPolicy:

    automated:
      prune: true
      selfHeal: true