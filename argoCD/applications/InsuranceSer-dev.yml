apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: myapp-dev
  namespace: argocd

spec:

  project: InsuranceService

  source:
    repoURL: https://github.com/rishikeyy/Central-Helm.git

    targetRevision: main

    path: charts/InsuranceService

    helm:
      valueFiles:
        - ../../environments/dev/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: myapp-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true